report_stats: false
macaroon_secret_key: "jgNKPvtf6NGB,:qF7cjm^rqBoEv~9&lh,I04@aRegiqdPc5ykh"
form_secret: "R=0@2W@-fjnjVU8Jnp:Pd@d.^N7EPJ,3ruR*h4okB*Fy1;53+r"
signing_key_path: "/data/localhost.signing.key"
trusted_key_servers:
