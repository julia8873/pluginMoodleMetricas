server_name: "localhost"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    bind_addresses: ['0.0.0.0']
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:
  name: sqlite3
  args:
    database: /data/homeserver.db
log_config: "/data/localhost.log.config"
media_store_path: /data/media_store
