services:
  mariadb:
    image: mariadb:10.11
    container_name: moodle-mariadb
    environment:
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=moodle_db_pass
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_ROOT_PASSWORD=moodle_root_pass
    volumes:
      - mariadb_data:/var/lib/mysql

  moodle:
    image: bitnamilegacy/moodle:latest
    container_name: moodle-app
    ports:
      - "8000:8080"
    environment:
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_PASSWORD=moodle_db_pass
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_USERNAME=adminmoodle
      - MOODLE_PASSWORD=test1234
      - MOODLE_EMAIL=admin@example.com
      - MOODLE_SITE_NAME=Moodle Matrix Dev
      - MOODLE_HOST=localhost:8000
    depends_on:
      - mariadb
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - ./synapse-data:/data

  element:
    image: vectorim/element-web:latest
    container_name: element-web
    ports:
      - "8081:80"
    volumes:
      - ./element-config.json:/app/config.json:ro
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - synapse

  maubot:
    build:
      context: ./github-bot-plugin
      dockerfile: Dockerfile.maubot
    container_name: maubot
    restart: unless-stopped
    volumes:
      - ./github-bot-plugin/maubot-data:/data
    ports:
      - "29316:29316"
    depends_on:
      - synapse

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ./ollama-data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  mariadb_data:
    driver: local
  moodle_data:
    driver: local
  moodledata_data:
    driver: local